name: CMake on multiple platforms

on:
  workflow_dispatch:

  push:
    branches: ["main"]
    paths:
      - "**/*.c"
      - "**/*.cc"
      - "**/*.cpp"
      - "**/*.cxx"
      - "**/*.h"
      - "**/*.hh"
      - "**/*.hpp"
      - "**/*.hxx"
      - "**/*.ipp"
      - "**/*.inl"
      - "**/CMakeLists.txt"
      - "**/*.cmake"
      - "CMakePresets.json"
      - "CMakeUserPresets.json"
      - "cmake/**"
      - "scripts/**"
      - ".clang-format"
      - ".clang-tidy"
      - ".github/actions/**"
      - ".github/workflows/cmake-multi-platform.yml"

  pull_request:
    branches: ["main"]
    paths:
      - "**/*.c"
      - "**/*.cc"
      - "**/*.cpp"
      - "**/*.cxx"
      - "**/*.h"
      - "**/*.hh"
      - "**/*.hpp"
      - "**/*.hxx"
      - "**/*.ipp"
      - "**/*.inl"
      - "**/CMakeLists.txt"
      - "**/*.cmake"
      - "CMakePresets.json"
      - "CMakeUserPresets.json"
      - "cmake/**"
      - "scripts/**"
      - ".clang-format"
      - ".clang-tidy"
      - ".github/actions/**"
      - ".github/workflows/cmake-multi-platform.yml"

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Install SonarQube build-wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v6

      - name: Configure CMake for SonarQube
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_BUILD_TYPE=Release
          -DCFGSYNC_BUILD_TESTS=ON
          -S ${{ github.workspace }}

      - name: Build with SonarQube build-wrapper
        run: >
          build-wrapper-linux-x86-64
          --out-dir bw-output
          cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.qualitygate.wait=true

  build:
    needs: sonar
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_type: Release
            c_compiler: cl
            cpp_compiler: cl
            installed_executable: bin/cfgsync.exe

          - os: ubuntu-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
            installed_executable: bin/cfgsync

          - os: ubuntu-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            installed_executable: bin/cfgsync

          - os: macos-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            installed_executable: bin/cfgsync

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          echo "install-output-dir=${{ github.workspace }}/install" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake
          -B "${{ steps.strings.outputs.build-output-dir }}"
          -S "${{ github.workspace }}"
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCFGSYNC_BUILD_TESTS=ON

      - name: Build
        run: >
          cmake --build "${{ steps.strings.outputs.build-output-dir }}"
          --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: >
          ctest
          --build-config ${{ matrix.build_type }}
          --output-on-failure

      - name: Install
        run: >
          cmake --install "${{ steps.strings.outputs.build-output-dir }}"
          --config ${{ matrix.build_type }}
          --prefix "${{ steps.strings.outputs.install-output-dir }}"

      - name: Validate installed CLI
        shell: pwsh
        run: |
          $executable = Join-Path `
            "${{ steps.strings.outputs.install-output-dir }}" `
            "${{ matrix.installed_executable }}"

          if (-not (Test-Path -Path $executable -PathType Leaf)) {
            throw "Installed executable was not found at $executable"
          }

          & $executable --help

          if ($LASTEXITCODE -ne 0) {
            throw "Installed executable exited with code $LASTEXITCODE"
          }

      - name: Collect CTest logs
        if: failure()
        shell: bash
        run: |
          mkdir -p ctest-logs
          cp -f \
            "${{ steps.strings.outputs.build-output-dir }}/Testing/Temporary/"*.log \
            ctest-logs/ 2>/dev/null || true

      - name: Upload CTest logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.os }}-${{ matrix.c_compiler }}
          path: ctest-logs
